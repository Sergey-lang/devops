# Docker Compose файл для hw2.
#
# Имя образа для back/front собирается из переменных DOCKERHUB_USERNAME и IMAGE_TAG —
# их compose берёт из .env.development.compose, который мы передаём флагом --env-file
# (см. Makefile).
#
# В этом файле НИГДЕ не должно быть сборки из исходников: образы должны браться
# готовыми с Docker Hub. Если потребуется собрать — это делает Makefile, не compose.

