name: PR Deploy

on:
  push:
    branches: [ week4 ]

jobs:
  checks:
    uses: ./.github/workflows/typecheck.yml

  build:
    needs: [ checks ]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service: [ back, front ]
        include:
          - service: front
            build_args: "--build-arg VITE_API_URL=${{ vars.VITE_API_URL }}"
    steps:
      - uses: actions/checkout@v4
      - name: Вход в Docker Hub
        run: docker login -u ${{secrets.DOCKER_USER}} --password-stdin ${{secrets.DOCKER_PASS}}

      - name: Build and push образа в Docker Hub
        env:
          IMAGE_SHA: ${{secrets.DOCKER_USER}}/todo-${{matrix.service}}:sha-${{github.sha}}
          IMAGE_LATEST: ${{secrets.DOCKER_USER}}/todo-${{matrix.service}}:latest
        run: |
          cd ${{matrix.service}}
          docker build -t $IMAGE_SHA -t $IMAGE_LATEST .
          docker push $IMAGE_SHA
          docker push $IMAGE_LATEST

  deploy:
    needs: [ build ]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Вход в директорию проекта на сервере
            cd /myapp
            
            # Вход в Docker Hub НА СЕРВЕРЕ
            # docker login -u ${{secrets.DOCKER_USER}} --password-stdin  ${{secrets.DOCKER_PASS}}
            
            # Берём название хеш комита и подставляем в переменную APP_VERSION в .env.development.compose
            # Эта переменная используется для загрузки нужного образа по хешу комита
            sed -i "s|APP_VERSION=.*|APP_VERSION=sha-${{ github.sha }}|" .env.development.compose
            
            # Пулим образ из Hub
            docker compose pull

            # Перезапускаем всё кроме db
            docker compose up -d --no-deps back front
  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke Test
        env:
          E2E_BASE_URL: ${{ vars.VITE_API_URL }}
        run: |
          # vars.VITE_API_URL у нас вида https://домен/api → отрежем /api
          export E2E_BASE_URL="${E2E_BASE_URL%/api}"
          bash scripts/smoke.sh

  notify:
    needs: [ checks, build, deploy, verify ]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify to Telegram
        run: |
          CHECKS="${{ needs.checks.result }}"
          BUILD="${{ needs.build.result }}"
          DEPLOY="${{ needs.deploy.result }}"
          VERIFY="${{ needs.verify.result }}"

          if [ "$CHECKS" != "success" ]; then
          TEXT="❌ Type-check упал%0A${{ github.repository }} @ ${{ github.ref_name }}%0A${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          elif [ "$BUILD" != "success" ]; then
          TEXT="❌ Build упал%0A${{ github.repository }} @ ${{ github.ref_name }}%0A${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          elif [ "$DEPLOY" != "success" ]; then
          TEXT="❌ Deploy упал%0A${{ github.repository }} @ ${{ github.ref_name }}%0A${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          elif [ "$VERIFY" != "success" ]; then
          TEXT="❌ Smoke не прошёл (задеплоено, но не отвечает корректно)%0A${{ github.repository }} @ ${{ github.ref_name }}%0A${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
          TEXT="✅ Деплой успешен%0A${{ github.repository }} @ ${{ github.ref_name }}%0AActor: ${{ github.actor }}%0AVersion: sha-${{ github.sha }}"
          fi

          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=$TEXT" \
          -d "disable_web_page_preview=true")
          
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"ok":true' || { echo "Telegram API rejected"; exit 1; }
