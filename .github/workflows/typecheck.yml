name: Typecheck

on:
  workflow_call:        # только так — снаружи сам по себе не запускается

jobs:
  typecheck:
    name: typecheck (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ back, front ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install deps
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Type-check
        working-directory: ${{ matrix.service }}
        run: npx tsc --noEmit
